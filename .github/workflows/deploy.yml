name: 🧪 Build & Deploy ML Lab

on:
  push:
    branches: [main, master]
  workflow_dispatch:          # allow manual runs

permissions:
  contents: write             # needed for gh-pages push
  pages:    write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# ──────────────────────────────────────────────
jobs:
# ──────────────────────────────────────────────

  build:
    name: Convert Notebooks & Build Site
    runs-on: ubuntu-latest

    steps:
      # 1 ── checkout ─────────────────────────────────────────────────────────
      - name: ⬇  Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history for accurate timestamps

      # 2 ── python ───────────────────────────────────────────────────────────
      - name: 🐍  Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3 ── system deps (pandoc for nbconvert) ───────────────────────────────
      - name: 📦  Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends pandoc

      # 4 ── python deps ──────────────────────────────────────────────────────
      - name: 📦  Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 5 ── build site ───────────────────────────────────────────────────────
      - name: 🔨  Build site
        run: python scripts/build_site.py

      # 6 ── upload artifact ──────────────────────────────────────────────────
      - name: 📤  Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: ml-lab-site
          path: _site/
          retention-days: 7

      # 7 ── deploy to gh-pages ───────────────────────────────────────────────
      - name: 🚀  Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: |
            chore: deploy ${{ github.sha }} — ${{ github.event.head_commit.message }}